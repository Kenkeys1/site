<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro-Grade Industrial Hardware</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --onyx: #111111; --gold: #D4AF37; --white: #ffffff; --gray: #f4f4f4; --navy: #001f3f; --purple: #9d00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gold); color: #333; line-height: 1.4; }

        /* Navigation Styles */
        .menu-btn { position: absolute; top: 20px; left: 20px; font-size: 24px; color: var(--gold); cursor: pointer; z-index: 1000; }
        .profile-btn { position: absolute; top: 20px; right: 20px; font-size: 24px; color: var(--gold); cursor: pointer; z-index: 1000; }
        .side-nav { height: 100%; width: 0; position: fixed; z-index: 2000; top: 0; left: 0; background-color: var(--navy); overflow-x: hidden; transition: 0.5s; padding-top: 60px; }
        .side-nav a { padding: 20px 15px; text-decoration: none; font-size: 1rem; color: var(--gold); display: block; transition: 0.3s; border-bottom: 1px solid rgba(255,215,0,0.1); }
        .side-nav a:hover { color: var(--white); background: rgba(255,255,255,0.05); }
        .side-nav .close-btn { position: absolute; top: 10px; right: 20px; font-size: 30px; cursor: pointer; color: var(--gold); }

        /* Header */
        header { background: var(--onyx); color: var(--gold); padding: 25px 15px; text-align: center; border-bottom: 4px solid var(--gold); }
        header h1 { font-size: 2.2rem; letter-spacing: 1px; text-transform: uppercase; }

        /* Search & Slideshow */
        .search-wrap { background-color: rgb(83, 92, 92); padding: 30px 10px; text-align: center; position: relative; overflow: hidden; }
        .slideshow-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .slideshow-container img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; opacity: 0; transition: opacity 1.5s ease-in-out; }
        .slideshow-container img.active { opacity: 0.7; }
        
        .search-container { position: relative; z-index: 1; width: 95%; max-width: 500px; margin: 0 auto; display: flex; align-items: center; }
        #search-bar { width: 100%; padding: 12px 40px 12px 20px; border: none; border-radius: 50px; font-size: 14px; outline: none; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .search-icon-btn { position: absolute; right: 15px; cursor: pointer; color: #666; font-size: 18px; border: none; background: transparent; }

        /* Category Filter */
        .category-nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 20px; background: var(--navy); }
        .cat-btn { padding: 10px 15px; border-radius: 20px; border: 1px solid var(--gold); background: transparent; color: var(--gold); cursor: pointer; font-size: 0.85rem; transition: 0.3s; }
        .cat-btn:hover, .cat-btn.active { background: var(--gold); color: var(--onyx); }

        /* Product Grid */
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; padding: 10px; max-width: 1200px; margin: auto; }
        .card { background: var(--white); padding: 10px; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-bottom: 3px solid var(--gold); transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .card img { width: 100%; height: 140px; object-fit: cover; border-radius: 2px; }
        .card h3 { margin: 8px 0; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--onyx); }
        .price { color: var(--gold); font-size: 1.1rem; font-weight: bold; margin-bottom: 5px; }
        .card p { font-size: 0.75rem; margin-bottom: 5px; }
        
        .btn-whatsapp { display: block; background: var(--onyx); color: var(--gold); text-align: center; padding: 8px; text-decoration: none; font-size: 0.8rem; font-weight: bold; border-radius: 4px; border: 1px solid var(--gold); transition: 0.3s; }
        .btn-whatsapp:hover { background: var(--gold); color: var(--onyx); }
        
        footer { background: var(--onyx); color: var(--white); padding: 30px 10px; text-align: center; margin-top: 20px; font-size: 0.75rem; }
        footer a { color: var(--white); text-decoration: none; }
        footer i { color: var(--gold); font-size: 1.2rem; margin-bottom: 5px; display: block; }

        /* Contact Popup Styles */
        .modal-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); backdrop-filter: blur(3px); z-index: 3000; 
            justify-content: center; align-items: center; 
        }
        .modal-box { 
            background: var(--white); width: 90%; max-width: 400px; padding: 25px; 
            border-radius: 15px; text-align: center; border: 3px solid var(--gold);
        }
        .contact-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 25px; }
        .contact-icon { font-size: 22px; color: var(--navy); text-decoration: none; display: flex; flex-direction: column; align-items: center; }
        .contact-icon span { font-size: 11px; margin-top: 8px; color: var(--onyx); font-weight: bold; }
        .message-area { width: 100%; height: 100px; margin: 15px 0; padding: 10px; border: 1px solid #ccc; border-radius: 5px; resize: none; font-size: 14px; }
    </style>
</head>
<body>

<div id="main-shop">
    <div class="menu-btn" onclick="toggleNav()"><i class="fas fa-bars"></i></div>
    <a href="profile.html" class="profile-btn"><i class="fas fa-user-circle"></i></a>

    <div id="mySidenav" class="side-nav">
        <a href="javascript:void(0)" class="close-btn" onclick="toggleNav()">&times;</a>
        <a href="categories.html">Product Categories</a>
        <a href="mailto:kenkeys10000@gmail.com">Customer Support</a>
        <a href="location.html">Store Location</a>
        <a href="about.html">About Us</a>
        <a href="javascript:void(0)" onclick="openContact(); toggleNav();">Contact Us</a>
        <a href="faq.html">FAQ</a>
    </div>

    <header>
        <h1><i class="fas fa-tools"></i> PRECISION HARDWARE</h1>
        <p>Professional Tools for Heavy Duty Performance</p>
    </header>

    <div class="search-wrap">
        <div class="slideshow-container" id="slideshow">
            <img src="download1.jpg" class="active" alt="Tool 1">
            <img src="precision.jpg" alt="Tool 2">
            <img src="drill.jpg" alt="Tool 3">
            <img src="Nut.jpg" alt="Tool 4">
        </div>
        <div class="search-container">
            <input type="text" id="search-bar" placeholder="search">
            <button class="search-icon-btn" onclick="filterProducts('All')"><i class="fas fa-search"></i></button>
        </div>
    </div>

    <div class="category-nav" id="category-nav"></div>

    <main id="product-container" class="container"></main>

    <footer>
        <a href="mailto:kenkeys10000@gmail.com">
            <i class="fas fa-headset"></i>
            <h3>Support & Sales</h3>
        </a>
        <p>Available on WhatsApp: +256 743 462 531</p>
        <p>&copy; 2026 Industrial Hardware Solutions</p>
    </footer>
</div>

<div id="contactModal" class="modal-overlay" onclick="closeContact()">
    <div class="modal-box" onclick="event.stopPropagation()">
        <h3>Contact Us</h3>
        <textarea id="msgInput" class="message-area" placeholder="Type your message here..."></textarea>
        <button onclick="sendWhatsAppMessage()" class="btn-whatsapp" style="width:100%; margin-bottom:20px;">
            <i class="fab fa-whatsapp"></i> Send via WhatsApp
        </button>
        
        <div class="contact-grid">
            <a href="tel:+256743462531" class="contact-icon"><i class="fas fa-phone"></i><span>Call</span></a>
            <a href="sms:+256743462531?body=Hello" class="contact-icon"><i class="fas fa-comment-sms"></i><span>SMS</span></a>
            <a href="mailto:kenkeys10000@gmail.com" class="contact-icon"><i class="fas fa-envelope"></i><span>Email</span></a>
            <a href="https://wa.me/256743462531?text=Hello" class="contact-icon"><i class="fab fa-whatsapp"></i><span>WhatsApp</span></a>
        </div>
    </div>
</div>

<script>
    window.onload = function() { loadData(); };

    function toggleNav() {
        const sideNav = document.getElementById("mySidenav");
        sideNav.style.width = sideNav.style.width === "50%" ? "0" : "50%";
    }

    document.addEventListener('click', function(event) {
        const sideNav = document.getElementById("mySidenav");
        const menuBtn = document.querySelector('.menu-btn');
        if (sideNav.style.width === "50%" && !sideNav.contains(event.target) && !menuBtn.contains(event.target)) {
            sideNav.style.width = "0";
        }
    });

    function openContact() { document.getElementById('contactModal').style.display = 'flex'; }
    function closeContact() { document.getElementById('contactModal').style.display = 'none'; }
    function sendWhatsAppMessage() {
        const msg = document.getElementById('msgInput').value;
        window.open(`https://wa.me/256743462531?text=${encodeURIComponent(msg)}`, '_blank');
    }

    let currentSlide = 0;
    const slides = document.querySelectorAll('#slideshow img');
    function nextSlide() {
        slides[currentSlide].classList.remove('active');
        currentSlide = (currentSlide + 1) % slides.length;
        slides[currentSlide].classList.add('active');
    }
    setInterval(nextSlide, 4000);

    let inventory = [];
    const whatsappNumber = "256743462531";
    const categories = ['All', 'Power Tools', 'Hand Tools', 'Fasteners', 'Safety Gear', 'Plumbing', 'Electrical', 'Measuring Tools', 'Lubricants'];

    async function loadData() {
    try {
        // Change the URL from 'products.json' to your local server API
        const response = await fetch('https://site-production-8457.up.railway.app/api/products');
        inventory = await response.json();
        renderCategories();
        filterProducts('All');
    } catch (e) { 
        console.error("Could not load products from server:", e); 
    }
}

    function renderCategories() {
        const nav = document.getElementById('category-nav');
        nav.innerHTML = categories.map(cat => 
            `<button class="cat-btn" onclick="filterProducts('${cat}')">${cat}</button>`
        ).join('');
    }

    function filterProducts(category) {
        const query = document.getElementById('search-bar').value.toLowerCase();
        const container = document.getElementById('product-container');
        
        const filtered = inventory.filter(p => {
            const matchCat = (category === 'All' || p.category === category);
            const matchSearch = p.name.toLowerCase().includes(query) || p.specs.toLowerCase().includes(query);
            return matchCat && matchSearch;
        });

        container.innerHTML = filtered.map(p => `
            <div class="card" style="cursor: pointer;">
                <a href="product-detail.html?id=${p.id}" style="text-decoration: none; color: inherit;">
                    <img src="http://localhost:3000${p.image}" alt="${p.name}">
                    <h3>${p.name}</h3>
                    <p><i class="fas fa-info-circle"></i> <strong>Specs:</strong> ${p.specs}</p>
                    <p class="price"><span style="color:#333; font-size:0.9rem;">UGX</span> ${p.price}</p>
                </a>
                <a href="https://wa.me/${whatsappNumber}?text=Hello, I want to order: ${p.name}" class="btn-whatsapp" target="_blank">
                    <i class="fab fa-whatsapp"></i> Order via WhatsApp
                </a>
            </div>
        `).join('');
    }

    document.getElementById('search-bar').addEventListener('keyup', () => filterProducts('All'));
</script>
</body>
</html>
