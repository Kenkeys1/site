<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Categories - Precision Hardware</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --onyx: #111111; --gold: #D4AF37; --white: #ffffff; --gray: #f4f4f4; --navy: #001f3f; --purple: #9d00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gold); color: #333; line-height: 1.4; }

        header { background: var(--onyx); color: var(--gold); padding: 25px 15px; text-align: center; border-bottom: 4px solid var(--gold); }
        .back-link { display: block; color: var(--white); text-decoration: none; margin-top: 10px; font-size: 0.9rem; }
        
        .search-wrap { background-color: rgb(83, 92, 92); padding: 30px 10px; text-align: center; background-image: url(Nut.jpg); }
        .search-container { position: relative; width: 95%; max-width: 500px; margin: 0 auto; display: flex; align-items: center; }
        #search-bar { width: 100%; padding: 12px 40px 12px 20px; border: none; border-radius: 50px; font-size: 14px; outline: none; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .search-icon-btn { position: absolute; right: 15px; cursor: pointer; color: #666; font-size: 18px; border: none; background: transparent; }

        .category-nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 20px; background: var(--navy); }
        .cat-btn { padding: 10px 15px; border-radius: 20px; border: 1px solid var(--gold); background: transparent; color: var(--gold); cursor: pointer; font-size: 0.85rem; transition: 0.3s; }
        .cat-btn:hover, .cat-btn.active { background: var(--gold); color: var(--onyx); }

        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; padding: 10px; max-width: 1200px; margin: auto; }
        .card { background: var(--white); padding: 10px; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-bottom: 3px solid var(--gold); }
        .card img { width: 100%; height: 140px; object-fit: cover; border-radius: 2px; }
        .card h3 { margin: 8px 0; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--onyx); }
        .price { color: var(--gold); font-size: 1.1rem; font-weight: bold; margin-bottom: 5px; }
        .card p { font-size: 0.75rem; margin-bottom: 5px; }
        .btn-whatsapp { display: block; background: var(--onyx); color: var(--gold); text-align: center; padding: 8px; text-decoration: none; font-size: 0.8rem; font-weight: bold; border-radius: 4px; border: 1px solid var(--gold); transition: 0.3s; }
        .btn-whatsapp:hover { background: var(--gold); color: var(--onyx); }

        footer { background: var(--onyx); color: var(--white); padding: 30px 10px; text-align: center; margin-top: 20px; font-size: 0.75rem; }
        footer a { color: var(--white); text-decoration: none; }
        footer i { color: var(--gold); font-size: 1.2rem; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

<header>
    <h1><i class="fas fa-tools"></i> CATEGORIES</h1>
    
</header>

<div class="search-wrap">
    <div class="search-container">
        <input type="text" id="search-bar" placeholder="Search in categories...">
        <button class="search-icon-btn"><i class="fas fa-search"></i></button>
    </div>
</div>

<div class="category-nav" id="category-nav"></div>

<main id="product-container" class="container"></main>

<footer>
        <a href="mailto:kenkeys10000@gmail.com">
            <i class="fas fa-headset"></i>
            <h3>Support & Sales</h3>
        </a>
        <p>Available on WhatsApp: +256 743 462 531</p>
        <p>&copy; 2026 Industrial Hardware Solutions</p>
    </footer>
<script>
    let inventory = [];
    const whatsappNumber = "256743462531";
    const categories = ['All', 'Power Tools', 'Hand Tools', 'Fasteners', 'Safety Gear', 'Plumbing', 'Electrical', 'Measuring Tools', 'Lubricants'];

    async function loadData() {
        try {
            const response = await fetch('products.json');
            inventory = await response.json();
            renderCategories();
            filterProducts('All');
        } catch (e) { console.error("Error loading products"); }
    }

    function renderCategories() {
        const nav = document.getElementById('category-nav');
        nav.innerHTML = categories.map(cat => 
            `<button class="cat-btn" onclick="filterProducts('${cat}')">${cat}</button>`
        ).join('');
    }

    function filterProducts(category) {
        const query = document.getElementById('search-bar').value.toLowerCase();
        const container = document.getElementById('product-container');
        
        const filtered = inventory.filter(p => {
            const matchCat = (category === 'All' || p.category === category);
            const matchSearch = p.name.toLowerCase().includes(query) || p.specs.toLowerCase().includes(query);
            return matchCat && matchSearch;
        });

        container.innerHTML = filtered.map(p => `
            <div class="card">
                <img src="${p.image}" alt="${p.name}">
                <h3>${p.name}</h3>
                <p><i class="fas fa-info-circle"></i> <strong>Specs:</strong> ${p.specs}</p>
                <p class="price">${p.price}</p>
                <a href="https://wa.me/${whatsappNumber}?text=I want to order: ${p.name}" class="btn-whatsapp" target="_blank">
                    <i class="fab fa-whatsapp"></i> Order via WhatsApp
                </a>
            </div>
        `).join('');
    }

    document.getElementById('search-bar').addEventListener('keyup', () => filterProducts('All'));
    window.onload = loadData;
</script>
</body>
</html>
