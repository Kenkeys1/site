<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - Precision Hardware</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --onyx: #111111; --gold: #D4AF37; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0909; color: var(--white); padding: 20px; }
        .form-container { max-width: 500px; margin: 40px auto; background: var(--white); color: #333; padding: 30px; border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .btn-save { background: var(--gold); color: var(--onyx); padding: 10px 20px; border: none; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        #profile-pic-preview { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; display: block; margin-bottom: 10px; border: 2px solid var(--gold); }
    </style>
</head>
<body>

<div class="form-container">
    <a href="profile.html"><i class="fas fa-arrow-left"></i> Back</a>
    <h2>Edit Profile</h2>
    
    <form id="profile-form">
        <div class="form-group">
            <img id="profile-pic-preview" src="https://via.placeholder.com/100" alt="Profile">
            <input type="file" id="profile-pic" accept="image/*" onchange="previewImage(event)">
        </div>
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter username">
        </div>
        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="phone" placeholder="+256...">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="New password">
        </div>
        <button type="button" class="btn-save" onclick="saveProfile()">Save Changes</button>
    </form>
</div>

<script>
    function previewImage(event) {
        const reader = new FileReader();
        reader.onload = function() {
            document.getElementById('profile-pic-preview').src = reader.result;
        }
        reader.readAsDataURL(event.target.files[0]);
    }

    function saveProfile() {
        const profile = {
            username: document.getElementById('username').value,
            phone: document.getElementById('phone').value,
            email: document.getElementById('email').value
        };
        localStorage.setItem('userProfile', JSON.stringify(profile));
        alert('Profile saved successfully!');
    }
</script>
</body>
</html>
