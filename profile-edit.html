<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precision Hardware - User Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css"/>
    <style>
        :root { --onyx: #111111; --gold: #D4AF37; --white: #ffffff; --navy: #001f3f; --orange: #ffa500; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0909; color: #fff; margin: 0; }
        header { background: var(--onyx); color: var(--gold); padding: 20px; text-align: center; border-bottom: 2px solid var(--gold); }
        .container { max-width: 500px; margin: 30px auto; padding: 25px; background: #161616; border-radius: 15px; box-shadow: 0 0 15px rgba(212,175,55,0.2); }
        
        .profile-wrapper { position: relative; width: 150px; margin: 0 auto 20px; }
        #profile-pic { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 4px solid var(--gold); display: block; cursor: pointer; }
        .avatar-initial { width: 150px; height: 150px; border-radius: 50%; background: var(--gold); color: var(--onyx); display: flex; align-items: center; justify-content: center; font-size: 5rem; font-weight: bold; border: 4px solid var(--gold); cursor: pointer; }
        .delete-btn { position: absolute; bottom: 5px; right: 5px; background: red; color: white; border-radius: 50%; width: 30px; height: 30px; border: none; cursor: pointer; display: none; }
        
        .input-group { margin-bottom: 20px; position: relative; }
        label { display: block; margin-bottom: 5px; color: var(--gold); font-size: 0.9rem; }
        input { width: 100%; padding: 12px; border-radius: 5px; border: 1px solid #444; background: #222; color: white; box-sizing: border-box; padding-right: 40px; }
        .toggle-btn { position: absolute; right: 15px; top: 38px; cursor: pointer; color: #888; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 5px; cursor: pointer; background: var(--gold); color: #000; font-weight: bold; margin-top: 10px; }
        
        #cropper-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; padding: 20px; box-sizing: border-box; }
        #crop-container { height: 80vh; width: 100%; margin-bottom: 10px; }
        .iti { width: 100%; }
    </style>
</head>
<body>

<header><h1><i class="fas fa-user-edit"></i> EDIT PROFILE</h1></header>

<div class="container">
    <div class="profile-wrapper">
        <div id="avatar-initial" class="avatar-initial" onclick="document.getElementById('upload-photo').click()"></div>
        <img id="profile-pic" src="" alt="Profile" style="display:none" onclick="document.getElementById('upload-photo').click()">
        <button class="delete-btn" id="del-photo" onclick="deletePhoto()"><i class="fas fa-trash"></i></button>
    </div>
    <input type="file" id="upload-photo" accept="image/*" style="display:none">

    <div class="input-group">
        <label>Full Name</label>
        <input type="text" id="edit-name">
    </div>
    <div class="input-group">
        <label>Email</label>
        <input type="email" id="edit-email">
    </div>
    <div class="input-group">
        <label>Phone Number</label>
        <input type="tel" id="phone">
    </div>
    <div class="input-group">
        <label>Current Password (Enter only if changing password)</label>
        <input type="password" id="current-pass">
        <i class="fas fa-eye toggle-btn" onclick="togglePass('current-pass')"></i>
    </div>
    <div class="input-group">
        <label>New Password</label>
        <input type="password" id="new-pass" placeholder="Leave blank to keep current">
        <i class="fas fa-eye toggle-btn" onclick="togglePass('new-pass')"></i>
    </div>
    <button class="btn" onclick="saveProfile()">Save All Changes</button>
    <p style="text-align: center; margin-top: 15px; color: #888; cursor: pointer;" onclick="forgotPassword()">Forgot Password?</p>
</div>

<div id="cropper-modal">
    <div id="crop-container"><img id="image-to-crop" style="max-width:100%"></div>
    <button class="btn" onclick="performCrop()">Save Cropped Photo</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
<script>
    const iti = window.intlTelInput(document.querySelector("#phone"), { initialCountry: "ug" });
    let cropper;

    window.onload = () => {
        const name = localStorage.getItem('username') || 'User';
        document.getElementById('edit-name').value = name;
        document.getElementById('edit-email').value = localStorage.getItem('email') || '';
        document.getElementById('phone').value = localStorage.getItem('phone') || '';
        updateAvatarDisplay(localStorage.getItem('avatar'));
    };

    function updateAvatarDisplay(avatar) {
        const pic = document.getElementById('profile-pic');
        const init = document.getElementById('avatar-initial');
        const del = document.getElementById('del-photo');
        if(avatar) {
            pic.src = avatar; pic.style.display = 'block';
            init.style.display = 'none'; del.style.display = 'block';
        } else {
            init.innerText = (document.getElementById('edit-name').value || 'U').charAt(0).toUpperCase();
            init.style.display = 'flex'; pic.style.display = 'none'; del.style.display = 'none';
        }
    }

    function deletePhoto() {
        localStorage.removeItem('avatar');
        updateAvatarDisplay(null);
    }

    document.getElementById('upload-photo').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            document.getElementById('cropper-modal').style.display = 'block';
            const img = document.getElementById('image-to-crop');
            img.src = event.target.result;
            if(cropper) cropper.destroy();
            cropper = new Cropper(img, { aspectRatio: 1, viewMode: 1 });
        };
        reader.readAsDataURL(file);
    };

    function performCrop() {
        const canvas = cropper.getCroppedCanvas({ width: 300, height: 300 });
        const dataUrl = canvas.toDataURL();
        localStorage.setItem('avatar', dataUrl);
        updateAvatarDisplay(dataUrl);
        document.getElementById('cropper-modal').style.display = 'none';
        cropper.destroy();
    }

    function togglePass(id) {
        const x = document.getElementById(id);
        x.type = (x.type === "password") ? "text" : "password";
    }

    function saveProfile() {
        const currentPassInput = document.getElementById('current-pass').value;
        const newPass = document.getElementById('new-pass').value;
        const storedPass = localStorage.getItem('password');

        // Only enforce password check if the user is attempting to set a new password
        if (newPass !== "") {
            if (storedPass && currentPassInput !== storedPass) {
                alert("Incorrect current password!");
                return;
            }
            localStorage.setItem('password', newPass);
        }

        // Save general info
        localStorage.setItem('username', document.getElementById('edit-name').value);
        localStorage.setItem('email', document.getElementById('edit-email').value);
        localStorage.setItem('phone', iti.getNumber());
        
        alert('Profile Updated Successfully!');
        location.reload();
    }

    function forgotPassword() {
        alert("A reset link has been sent to your registered email.");
    }
</script>
</body>
</html>
